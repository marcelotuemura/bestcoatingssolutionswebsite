name: Bug report
description: Report something that is not working as expected.
title: 'bug: '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Marketing site
        - Customer Portal
        - SEO / metadata
        - Performance
        - Accessibility
        - Tooling / CI
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'Browser, device, OS, URL'
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
