name: Feature request
description: Propose a new capability or improvement.
title: 'feat: '
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Marketing site
        - Customer Portal
        - Integrations
        - SEO
        - Performance
        - Accessibility
        - Tooling / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
